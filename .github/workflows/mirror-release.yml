name: Mirror Release to Cloudflare

on:
  workflow_call:
    inputs:
      tag:
        required: false
        type: string
  workflow_dispatch:
    inputs:
      tag:
        description: "GitHub Release tag to reconcile"
        required: false
        type: string
  release:
    types: [published]
  schedule:
    - cron: "23 3 * * *"

permissions:
  contents: read

concurrency:
  group: mirror-release-${{ inputs.tag || github.event.release.tag_name || 'latest-stable' }}
  cancel-in-progress: false

jobs:
  mirror:
    name: Reconcile R2 release mirror
    runs-on: ubuntu-24.04
    env:
      GH_TOKEN: ${{ github.token }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Resolve release tag
        id: release
        shell: bash
        env:
          REQUESTED_TAG: ${{ inputs.tag || github.event.release.tag_name }}
        run: |
          tag="$REQUESTED_TAG"
          if [ -z "$tag" ]; then
            tag="$(gh release list --repo "$GITHUB_REPOSITORY" --exclude-drafts --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName')"
          fi
          test -n "$tag"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Mirror release assets and metadata
        run: node scripts/sync-cloudflare-release.mjs --tag "${{ steps.release.outputs.tag }}"
